<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Page Not Found | HK Towing</title>
    <meta name="description" content="The page you are looking for does not exist." />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
      
      :root {
        --black: #0a0a0a;
        --yellow: #F5C400;
        --white: #ffffff;
      }
      
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'Barlow', sans-serif;
        background: var(--white);
        color: var(--black);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      
      .container {
        max-width: 600px;
        background: var(--black);
        color: var(--white);
        padding: 64px 40px;
        border-radius: 8px;
        border-bottom: 6px solid var(--yellow);
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      }
      
      h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(4rem, 10vw, 6rem);
        color: var(--yellow);
        line-height: 1;
        margin-bottom: 16px;
      }
      
      h2 {
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 1.5rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 24px;
      }
      
      p {
        font-size: 1.1rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 32px;
      }
      
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--yellow);
        color: var(--black);
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 16px 32px;
        border-radius: 4px;
        text-decoration: none;
        transition: background 0.2s, transform 0.2s;
      }
      
      .btn:hover {
        background: #d4a900;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>Sorry, the page you are looking for might have been removed, had its name changed, or is temporarily unavailable. If you need a tow right now, call us at (864) 686-0012.</p>
      <a href="/" class="btn">Return to Homepage</a>
    </div>
  </body>
</html>
